<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Менің сүйікті тағамдарым</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #333;
        }

        header {
            text-align: center;
            padding: 30px 20px;
            color: white;
            font-size: 24px;
            font-weight: bold;
        }

        .food-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 25px;
            padding: 30px;
        }

        .card {
            backdrop-filter: blur(15px);
            background: rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            overflow: hidden;
            text-align: center;
            color: white;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            transition: 0.4s;
        }

        .card:hover {
            transform: translateY(-10px) scale(1.03);
        }

        .card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }

        .card h2 {
            margin: 15px 0 10px;
        }

        .card p {
            padding: 0 15px 20px;
            font-size: 14px;
        }

        footer {
            text-align: center;
            padding: 15px;
            color: white;
            background: rgba(0,0,0,0.3);
            margin-top: 20px;
        }

        @media (max-width: 600px) {
            header {
                font-size: 18px;
            }

            .card img {
                height: 160px;
            }
        }
    </style>
</head>
<body>

<header>
    <h1>Менің сүйікті тағамдарым 🍽️</h1>
</header>

<section class="food-container">

    <div class="card">
        <img src="https://opis-cdn.tinkoffjournal.ru/mercury/11-beshbarmak.jpg">
        <h2>Бешбармақ</h2>
        <p>Қазақтың ұлттық тағамы, ет пен қамырдан дайындалады.</p>
    </div>

    <div class="card">
        <img src="https://i.ytimg.com/vi/aerm24y6cHk/maxresdefault.jpg">
        <h2>Палау</h2>
        <p>Күріш, ет және сәбізбен дайындалатын өте дәмді тағам.</p>
    </div>

    <div class="card">
        <img src="https://static.1000.menu/img/content-v2/95/10/16882/samsa-s-farshem-iz-sloenogo-testa_1644501025_prev_hor.jpg">
        <h2>Самса</h2>
        <p>Ішіне ет салынған пеште пісірілетін бәліш.</p>
    </div>

    <div class="card">
        <img src="https://tse4.mm.bing.net/th/id/OIP.KcjYtWQYzFZd2c4Bp6i46wHaE8">
        <h2>Пицца</h2>
        <p>Ірімшік пен түрлі қоспалармен жасалатын италиялық тағам.</p>
    </div>

</section>

<footer>
    <p>© 2026 Менің сайтым</p>
</footer>

</body>
</html>
